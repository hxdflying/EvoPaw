version: "3.8"
services:
  pgvector:
    image: pgvector/pgvector:pg16    # PostgreSQL 16 + pgvector 扩展
    ports:
      - "5432:5432"                  # 默认 postgres 端口
    environment:
      POSTGRES_DB:       evopaw_memory
      POSTGRES_USER:     evopaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evopaw123}
    volumes:
      # 💡 核心点：schema.sql 放在 initdb 目录，容器首次启动时自动执行
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      # 数据持久化：关闭容器后数据不丢失
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evopaw -d evopaw_memory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
