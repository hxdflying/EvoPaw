# Skill 清单 — EvoPaw 小爪子工作助手
#
# type 字段区分 Skill 的执行方式：
#   task      → 触发独立 Sub-Agent（Claude Haiku 4.5）执行（需要代码运行）
#   reference → 直接注入指令到调用方上下文，不启动 Sub-Agent（只读规范类）
#
# enabled: false 时 SkillLoaderTool 跳过该 Skill，不注入到 description

skills:
  # ── 文件处理 ──────────────────────────────────────────────────────────────
  - name: pdf
    type: task        # 需要代码执行（pypdf / pdfplumber）
    enabled: true

  - name: docx
    type: task        # 需要代码执行（python-docx / pandoc）
    enabled: true

  - name: pptx
    type: task        # 需要代码执行（python-pptx / markitdown）
    enabled: true

  - name: xlsx
    type: task        # 需要代码执行（pandas / openpyxl）
    enabled: true

  # ── 飞书平台操作 ────────────────────────────────────────────────────────────
  - name: feishu_ops
    type: task        # 需要代码执行（飞书 REST API 调用）
    enabled: true

  # ── 定时任务管理 ────────────────────────────────────────────────────────────
  - name: scheduler_mgr
    type: task        # 需要代码执行（读写 tasks.json）
    enabled: true

  # ── 网络搜索 ────────────────────────────────────────────────────────────────
  - name: tavily_search
    type: task        # 使用 Tavily API 搜索互联网
    enabled: true

  # ── 论文搜索 ────────────────────────────────────────────────────────────────
  - name: arxiv_search
    type: task        # 搜索 arXiv 论文库 + 下载 PDF
    enabled: true

  # ── 网页浏览与内容提取 ──────────────────────────────────────────────────────
  # ⚠️ 暂时禁用：SKILL.md 引用 browser_* / sandbox_convert_to_markdown，但当前
  # Sub-Agent 工具集只有 Bash/Read/Write/Edit/Grep/Glob（见 claude_client.py:82），
  # 这些工具拿不到，调用必然失败。后续补 httpx + markitdown 纯 Bash 实现的
  # scripts/ 后再启用。详见 docs/skills-module-review-codex-2026-05-07.md。
  - name: web_browse
    type: task
    enabled: false

  # ── 历史记录读取（参考型：Agent 自行推理，无需 Sub-Agent）─────────────────────
  - name: history_reader
    type: reference   # 直接返回操作规范给主 Agent
    enabled: true

  # ── 记忆体系（第22课新增）────────────────────────────────────────────────────
  - name: memory-save
    type: task        # 将偏好/事实持久化到 workspace 文件
    enabled: true

  - name: skill-creator
    type: task        # 将 SOP 固化为新 SKILL.md
    enabled: true

  - name: memory-governance
    type: task        # 审计 memory.md 死链并清理
    enabled: true

  - name: search_memory
    type: task        # 语义搜索 pgvector 历史对话
    enabled: true

  - name: daily-summary
    path: ./daily-summary
    type: task
    enabled: true

  - name: investment-report
    path: ./investment-report
    type: task
    enabled: true

  - name: investment-review
    path: ./investment-review
    type: task
    enabled: true

  # ⚠️ 暂时禁用：SKILL.md 列出 sandbox_execute_bash / browser_navigate 等
  # Sub-Agent 不具备的工具。补真实数据脚本（参考 investment-report 的 akshare 用法）后再启用。
  - name: investment-consult
    path: ./investment-consult
    type: task
    enabled: false

  - name: hk-investment-morning-report
    path: ./hk-investment-morning-report
    type: task
    enabled: true
